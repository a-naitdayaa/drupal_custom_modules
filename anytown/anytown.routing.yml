anytown.weather_page:
  path: '/weather/{style}'
  defaults:
    _title: 'Weather'
    _controller: '\Drupal\anytown\Controller\WeatherController::build'
    style: 'short'
  requirements:
    _permission: 'view weekly weather'

anytown.settings:
  path: '/admin/config/system/anytown'
  defaults:
    _title: 'Weather Form'
    _form: '\Drupal\anytown\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'

anytown.node_select_form:
  path: '/anytown/node-select'
  defaults:
    _form: '\Drupal\anytown\Form\NodeSelectForm'
    _title: 'Select a Node'
  requirements:
    _permission: 'access content'
